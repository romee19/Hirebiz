<ion-content>
  <div class="list-container" #containerRef [class.painting]="paintMode">

    <!-- LEGEND -->
    <div class="legend">
      <div class="legend-item">
        <div class="legend-color" style="background:#9e9e9e;"></div>
        <span>No Unit</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background:#4caf50;"></div>
        <span>Single Unit</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background:#ff5722;"></div>
        <span>Dual Monitor</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background:#f44336;"></div>
        <span>No User</span>
      </div>
    </div>

    <!-- EDIT BUTTON -->
    <button
      #editBtn
      class="edit-button"
      type="button"
      (click)="toggleToolbox(editBtn)"
    >
      + Edit
    </button>

    <!-- DRAGGABLE FLOATING TOOLBOX -->
    <div
      class="toolbox"
      *ngIf="toolboxOpen"
      [ngStyle]="{ left: toolboxX + 'px', top: toolboxY + 'px' }"
    >
      <div class="toolbox-handle" (pointerdown)="onToolboxDragStart($event)">
        <button class="toolbox-close" type="button" (click)="closeToolbox()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <div class="toolbox-body">
        <div class="tool-mid">
          <div class="swatches">
            <div class="sw-row">
              <!-- Add cubicle -->
              <button class="tool-pill" type="button" (click)="addCubicle()"></button>
              <div class="tool-label">Cubicle</div>
            </div>

            <div class="sw-row">
              <button
                class="swatch"
                type="button"
                [style.background]="'#9e9e9e'"
                [class.active]="selectedColor === '#9e9e9e'"
                (click)="selectColor('#9e9e9e')"
              ></button>

              <button
                class="swatch"
                type="button"
                [style.background]="'#4caf50'"
                [class.active]="selectedColor === '#4caf50'"
                (click)="selectColor('#4caf50')"
              ></button>
            </div>

            <div class="sw-row">
              <button
                class="swatch"
                type="button"
                [style.background]="'#000000'"
                [class.active]="selectedColor === '#000000'"
                (click)="selectColor('#000000')"
              ></button>

              <button
                class="swatch"
                type="button"
                [style.background]="'#f44336'"
                [class.active]="selectedColor === '#f44336'"
                (click)="selectColor('#f44336')"
              ></button>
            </div>

            <div class="sw-row">
              <button
                class="swatch"
                type="button"
                [style.background]="'#ff5722'"
                [class.active]="selectedColor === '#ff5722'"
                (click)="selectColor('#ff5722')"
              ></button>
            </div>
          </div>

          <!-- Paint / Fill Mode -->
          <button
            class="brush-btn"
            type="button"
            [class.active]="paintMode"
            (click)="togglePaintMode()"
          >
            <ion-icon name="color-fill"></ion-icon>
          </button>
        </div>

        <div class="tool-footer">
          <button class="save-btn" type="button" (click)="saveEditSettings()">
            Save
          </button>
        </div>
      </div>
    </div>

    <!-- CUBICLES -->
    <div
      class="cubicle"
      *ngFor="let c of cubicles"
      [class.editing]="isEditMode"
      [class.selected]="selectedCubicleId === c.id"
      [ngStyle]="{
        left: c.x + 'px',
        top: c.y + 'px',
        width: c.w + 'px',
        height: c.h + 'px',
        background: c.color
      }"
      (dblclick)="deleteCubicle(c.id)"
      (pointerdown)="onCubiclePointerDown($event, c)"
    >
      <div class="cubicle-label">{{ c.label }}</div>

      <!-- resize handle only in edit mode -->
      <div
        class="resize-handle"
        *ngIf="isEditMode"
        (pointerdown)="onResizeStart($event, c)"
      ></div>
    </div>

  </div>
</ion-content>
